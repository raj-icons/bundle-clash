<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bundle Clash</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff4d6d; --blue: #4cc9f0; --green: #06d6a0; --yellow: #ffd166;
    --bg: #0d0d1a; --panel: #13132b; --card-bg: #1a1a3e;
    --text: #f0f0ff; --muted: #7788aa; --accent: #f72585;
    --team-a: #4cc9f0; --team-b: #f72585;
    --success: #06d6a0; --warning: #ffd166;
    --purple: #7209b7; --violet: #560bad;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  h1, h2, h3 { font-family: 'Rajdhani', sans-serif; }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; }

  /* LOGIN */
  #loginScreen {
    flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a0533 0%, #0d0d1a 70%);
    gap: 2rem;
  }
  .logo { text-align: center; }
  .logo h1 { font-size: 3.5rem; background: linear-gradient(135deg, #f72585, #4cc9f0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 4px; text-transform: uppercase; }
  .logo p { color: var(--muted); font-size: 1rem; letter-spacing: 2px; }
  .login-box {
    background: var(--panel); border: 1px solid #2a3a5c; border-radius: 16px;
    padding: 2rem; width: 360px; display: flex; flex-direction: column; gap: 1rem;
  }
  .login-box input {
    background: var(--bg); border: 1px solid #2a3a5c; border-radius: 8px;
    color: var(--text); font-family: 'Nunito', sans-serif; font-size: 1rem;
    padding: 0.75rem 1rem; width: 100%; outline: none;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .btn {
    border: none; border-radius: 8px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700;
    letter-spacing: 1px; padding: 0.75rem 1.5rem; transition: all 0.2s; width: 100%;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #c0392b; transform: translateY(-1px); }
  .btn-secondary { background: #2a3a5c; color: var(--text); }
  .btn-secondary:hover { background: #3a4a6c; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #27ae60; }
  .btn-warn { background: var(--warning); color: #fff; }
  .divider { color: var(--muted); text-align: center; font-size: 0.85rem; }

  /* LOBBY */
  #lobbyScreen { flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; padding: 2rem; }
  .lobby-box {
    background: var(--panel); border: 1px solid #2a3a5c; border-radius: 16px;
    padding: 2rem; width: 100%; max-width: 700px;
  }
  .lobby-box h2 { font-size: 1.6rem; margin-bottom: 1rem; color: var(--accent); }
  .room-code { font-size: 2.5rem; font-family: 'Rajdhani', sans-serif; font-weight: 700; color: var(--warning); letter-spacing: 8px; text-align: center; margin: 0.5rem 0 1rem; }
  .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
  .team-col { background: var(--bg); border-radius: 10px; padding: 1rem; }
  .team-col h3 { font-size: 1.1rem; margin-bottom: 0.75rem; }
  .team-a-title { color: var(--team-a); }
  .team-b-title { color: var(--team-b); }
  .player-slot {
    align-items: center; background: #1a2a4a; border-radius: 6px;
    display: flex; font-size: 0.9rem; gap: 0.5rem; margin-bottom: 0.5rem; padding: 0.5rem 0.75rem;
  }
  .player-slot.empty { color: var(--muted); font-style: italic; }
  .dot { border-radius: 50%; height: 8px; width: 8px; }
  .dot-a { background: var(--team-a); }
  .dot-b { background: var(--team-b); }
  .dot-online { background: var(--success); }
  .status-msg { color: var(--muted); font-size: 0.9rem; text-align: center; }

  /* GAME */
  #gameScreen {
    flex-direction: column; height: 100vh; overflow: hidden;
    background: var(--bg);
  }
  .game-header {
    align-items: center; background: linear-gradient(90deg, #13132b, #1a0d2e); border-bottom: 1px solid #3a2a5c;
    display: flex; gap: 1rem; justify-content: space-between; padding: 0.75rem 1.5rem;
  }
  .game-header h2 { font-size: 1.4rem; background: linear-gradient(135deg, #f72585, #4cc9f0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .score-board { display: flex; gap: 1.5rem; }
  .score-item { text-align: center; }
  .score-item .label { font-size: 0.7rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .score-item .val { font-size: 1.6rem; font-family: 'Rajdhani', sans-serif; font-weight: 700; }
  .val-a { color: var(--team-a); }
  .val-b { color: var(--team-b); }
  .turn-badge {
    background: #2a3a5c; border-radius: 20px; font-size: 0.85rem;
    padding: 0.3rem 1rem;
  }
  .turn-badge.my-turn { background: var(--accent); color: #fff; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

  .game-body { display: flex; flex: 1; overflow: hidden; }

  /* PLAYERS SIDEBAR */
  .players-panel {
    background: var(--panel); border-right: 1px solid #2a3a5c;
    display: flex; flex-direction: column; gap: 0.5rem;
    overflow-y: auto; padding: 1rem; width: 200px;
  }
  .players-panel h3 { color: var(--muted); font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 0.25rem; text-transform: uppercase; }
  .player-card {
    border-radius: 8px; border: 1px solid #2a3a5c; cursor: default;
    font-size: 0.85rem; padding: 0.5rem 0.75rem;
    transition: border-color 0.2s;
  }
  .player-card.team-a { border-left: 3px solid var(--team-a); }
  .player-card.team-b { border-left: 3px solid var(--team-b); }
  .player-card.active-turn { background: #1a2a4a; border-color: var(--warning); }
  .player-card .pname { font-weight: 700; display: flex; align-items: center; gap: 0.4rem; }
  .player-card .pcards { color: var(--muted); font-size: 0.75rem; }
  .player-card.player-offline { opacity: 0.55; filter: grayscale(30%); }
  .presence-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
  .dot-online  { background: var(--success); box-shadow: 0 0 5px var(--success); }
  .dot-offline { background: #f72585; box-shadow: 0 0 5px #f72585; }
  
  /* BUNDLES STATUS IN SIDEBAR */
  .sidebar-bundles { margin-top: auto; padding-top: 1rem; border-top: 1px solid #2a3a5c; }
  .bundle-item {
    align-items: center; display: flex; font-size: 0.75rem;
    gap: 0.4rem; justify-content: space-between; margin-bottom: 0.3rem;
  }
  .bundle-label { font-weight: 600; }
  .bundle-won { color: var(--success); }
  .bundle-won-b { color: var(--team-b); }

  /* MAIN AREA */
  .main-area { display: flex; flex: 1; flex-direction: column; overflow: hidden; }

  /* MY HAND */
  .hand-area {
    background: var(--panel); border-top: 1px solid #2a3a5c;
    padding: 0.75rem 1rem; min-height: 130px;
  }
  .hand-area h3 { color: var(--muted); font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 0.5rem; text-transform: uppercase; }
  .cards-row { display: flex; flex-wrap: wrap; gap: 6px; }
  
  /* ✨ Visual Polish Animations */
  @keyframes cardPop {
    0% { transform: scale(0.8) translateY(10px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  .card {
    align-items: center; border-radius: 8px; border: 2px solid transparent;
    cursor: default; display: flex; flex-direction: column; font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem; font-weight: 700; height: 72px; justify-content: center;
    letter-spacing: 1px; position: relative; transition: all 0.15s; user-select: none; width: 52px;
    animation: cardPop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  .card.selectable { cursor: pointer; border-color: #fff5; }
  .card.selectable:hover { transform: translateY(-4px); box-shadow: 0 6px 16px rgba(0,0,0,0.6); }
  .card.selected { transform: translateY(-8px); border-color: var(--warning); box-shadow: 0 0 12px var(--warning); }
  
  .card.correct-card {
    border-color: var(--success) !important;
    box-shadow: 0 0 14px var(--success), 0 0 4px #fff2;
  }
  .card.wrong-card { opacity: 0.45; filter: grayscale(40%); }

  @keyframes claimShake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }
  .shake-animation {
    animation: claimShake 0.4s ease-in-out !important;
    border-color: var(--accent) !important;
  }

  @keyframes flashGreen {
    0%, 100% { background: var(--panel); }
    50% { background: rgba(6, 214, 160, 0.2); border-color: var(--success); }
  }
  .flash-success {
    animation: flashGreen 0.8s ease-in-out;
  }

  .card.red    { background: linear-gradient(135deg, #4a0820, #7a1030); color: #ff4d6d; border-color: #ff4d6d44; }
  .card.blue   { background: linear-gradient(135deg, #052a4a, #0a3a6a); color: #4cc9f0; border-color: #4cc9f044; }
  .card.green  { background: linear-gradient(135deg, #023a25, #045535); color: #06d6a0; border-color: #06d6a044; }
  .card.yellow { background: linear-gradient(135deg, #3a2800, #5a3c00); color: #ffd166; border-color: #ffd16644; }
  .card .cnum { font-size: 1.3rem; }
  .card .ccolor { font-size: 0.6rem; opacity: 0.8; text-align: center; }

  /* GIVER MODAL INTERFACE */
  .ask-picker-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200;
    display: none; align-items: center; justify-content: center;
  }
  .ask-picker-overlay.open { display: flex; }
  .ask-picker-box {
    background: linear-gradient(160deg, #1a0d2e, #0d0d2a);
    border: 1px solid #f7258566; border-radius: 20px;
    padding: 1.75rem; min-width: 280px; max-width: 360px; width: 90%;
  }
  .ask-picker-card-preview { text-align: center; margin: 0.75rem 0 1rem; }
  .ask-picker-card-preview .preview-pill {
    display: inline-block; padding: 0.35rem 1.2rem; border-radius: 20px;
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 2px;
  }
  .preview-pill.red    { background: #7a1030; color: #ff4d6d; border: 1px solid #ff4d6d88; }
  .preview-pill.blue   { background: #0a3a6a; color: #4cc9f0; border: 1px solid #4cc9f088; }
  .preview-pill.green  { background: #045535; color: #06d6a0; border: 1px solid #06d6a088; }
  .preview-pill.yellow { background: #5a3c00; color: #ffd166; border: 1px solid #ffd16688; }
  .ask-opponent-btn {
    width: 100%; margin-bottom: 0.5rem; padding: 0.8rem 1rem;
    border: 1px solid #f7258533; border-radius: 10px; background: #200a35;
    color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 1.05rem;
    font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 0.75rem;
  }
  .ask-opponent-btn:hover { background: #f72585cc; }
  .ask-picker-cancel { width: 100%; margin-top: 0.25rem; padding: 0.5rem; border-radius: 8px; background: transparent; color: var(--muted); border: 1px solid #2a3a5c; cursor: pointer;}
  
  .chat-action-area { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
  .chat-panel { display: flex; flex: 1; flex-direction: column; width: 100%; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.4rem; }
  .chat-msg { border-radius: 6px; font-size: 0.88rem; padding: 0.4rem 0.75rem; }
  .chat-msg.system { background: #1a2a3a; color: var(--muted); }
  .chat-msg.team-a { background: #0d2a4a; border-left: 3px solid var(--team-a); }
  .chat-msg.team-b { background: #3a0d0d; border-left: 3px solid var(--team-b); }
  .chat-input-row { border-top: 1px solid #2a3a5c; display: flex; gap: 0.5rem; padding: 0.75rem; }
  .chat-input-row input { background: var(--bg); border: 1px solid #2a3a5c; border-radius: 6px; color: var(--text); flex: 1; padding: 0.5rem; outline: none;}
  
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid #2a3a5c; border-radius: 16px; padding: 2rem; width: 500px; }
  .modal-btns { display: flex; gap: 0.75rem; margin-top: 1rem; }
  select { background: var(--bg); border: 1px solid #2a3a5c; border-radius: 6px; color: var(--text); padding: 0.5rem; width: 100%; margin-bottom: 0.5rem; }
  
  #gameOverScreen { flex-direction: column; align-items: center; justify-content: center; gap: 2rem; }
  .winner-box { text-align: center; background: var(--panel); border: 1px solid #2a3a5c; border-radius: 20px; padding: 3rem; }
  .err { color: var(--accent); font-size: 0.85rem; text-align: center; }
</style>
<script>
  // 📱 Mobile Redirect Rule
  if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
    window.location.href = "bundle-clash.html";
  }
</script>
</head>
<body>

<audio id="sndBackground" src="song.mp3" preload="auto" loop></audio>
<audio id="sndDeal" src="deal.mp3" preload="auto"></audio>
<audio id="sndSuccess" src="success.mp3" preload="auto"></audio>
<audio id="sndFail" src="fail.mp3" preload="auto"></audio>

<div id="loginScreen" class="screen active">
  <div class="logo">
    <h1>Bundle Clash</h1>
    <p>4-player card strategy game</p>
  </div>
  <div class="login-box">
    <input id="nameInput" type="text" placeholder="Your name" maxlength="16" />
    <button class="btn btn-primary" onclick="createRoom()">Create Room</button>
    <div class="divider">— or join existing —</div>
    <input id="roomInput" type="text" placeholder="Room code" maxlength="6" style="text-transform:uppercase;letter-spacing:4px" />
    <button class="btn btn-secondary" onclick="joinRoom()">Join Room</button>
    <div id="loginErr" class="err"></div>
  </div>
</div>

<div id="lobbyScreen" class="screen">
  <div class="lobby-box">
    <h2>Lobby</h2>
    <div class="room-code" id="lobbyCode"></div>
    <div class="teams-grid">
      <div class="team-col">
        <h3 class="team-a-title">Team A</h3>
        <div id="teamASlots"></div>
        <button class="btn btn-secondary" style="margin-top:0.5rem;" onclick="switchTeam('A')">Join Team A</button>
      </div>
      <div class="team-col">
        <h3 class="team-b-title">Team B</h3>
        <div id="teamBSlots"></div>
        <button class="btn btn-secondary" style="margin-top:0.5rem;" onclick="switchTeam('B')">Join Team B</button>
      </div>
    </div>
    <div style="margin-top:1rem;" id="lobbyActions"></div>
    <div class="status-msg" id="lobbyStatus"></div>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="game-header">
    <h2>Bundle Clash</h2>
    <div class="score-board">
      <div class="score-item"><div class="label">Team A</div><div class="val val-a" id="scoreA">0</div></div>
      <div class="score-item"><div class="label">vs</div><div class="val">:</div></div>
      <div class="score-item"><div class="label">Team B</div><div class="val val-b" id="scoreB">0</div></div>
    </div>
    <div id="myNameBadge"></div>
  </div>

  <div class="game-body">
    <div class="players-panel">
      <h3>Players</h3>
      <div id="playersList"></div>
      <div class="sidebar-bundles">
        <h3>Bundles Won</h3>
        <div id="bundlesStatus"></div>
      </div>
    </div>

    <div class="main-area">
      <div class="chat-action-area">
        <div class="chat-panel">
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-row">
            <button class="btn btn-warn" style="width:auto; padding:0.5rem 1rem;" onclick="openClaimBoard()">Claim Bundle</button>
            <input id="chatInput" type="text" placeholder="Chat with teammates..." onkeydown="if(event.key==='Enter')sendChat()" />
            <button class="btn btn-primary" style="width:auto; padding:0.5rem 1rem;" onclick="sendChat()">➤</button>
          </div>
        </div>
      </div>

      <div class="hand-area">
        <h3>My Hand (<span id="handCount">0</span> cards)</h3>
        <div class="cards-row" id="myHand"></div>
      </div>
    </div>
  </div>
</div>

<div class="ask-picker-overlay" id="givePickerOverlay">
  <div class="ask-picker-box">
    <h3>Give Card To...</h3>
    <div class="ask-picker-card-preview"><span class="preview-pill" id="givePickerPill">—</span></div>
    <div id="givePlayerList"></div>
    <button class="ask-picker-cancel" onclick="closeGivePicker()">Cancel</button>
  </div>
</div>

<div class="modal-overlay" id="claimBoardModal">
  <div class="modal">
    <h2>Claim Board</h2>
    <div id="claimSetup">
      <select id="cbColor">
        <option value="">— Color —</option><option value="red">Red</option><option value="blue">Blue</option><option value="green">Green</option><option value="yellow">Yellow</option>
      </select>
      <select id="cbBundle">
        <option value="">— Bundle —</option><option value="low">Low (0–5)</option><option value="high">High (6–11)</option>
      </select>
      <button class="btn btn-success" onclick="generateClaimCards()">Start Assigning</button>
      <button class="btn btn-secondary" style="margin-top:0.5rem;" onclick="closeClaimBoard()">Cancel</button>
    </div>
    <div id="claimInteractive" style="display:none; margin-top:1rem;">
      <div id="claimCardsRow" class="cards-row" style="justify-content:center; margin-bottom:1rem;"></div>
      <div class="modal-btns">
        <button class="btn btn-secondary" onclick="closeClaimBoard()">Cancel</button>
        <button class="btn btn-success" onclick="submitInteractiveClaim()">Submit Claim</button>
      </div>
    </div>
  </div>
</div>

<div id="gameOverScreen" class="screen">
  <div class="winner-box">
    <h1 id="winnerText">🏆</h1>
    <p id="winnerSub"></p>
    <button class="btn btn-primary" style="margin-top:2rem;" onclick="location.reload()">Play Again</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  FIREBASE CONFIGURATION
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyBMMo7hjXRwFGhdDH2Jl3loZI2rQtK4jwQ",
  authDomain: "card-1e6c9.firebaseapp.com",
  databaseURL: "https://card-1e6c9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "card-1e6c9",
  storageBucket: "card-1e6c9.firebasestorage.app",
  messagingSenderId: "679678925926",
  appId: "1:679678925926:web:6d448f896170179f22a1a7",
  measurementId: "G-3951QWXT65"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let presenceRef = null;
const COLORS = ['red','blue','green','yellow'];
const BUNDLES = { low:[0,1,2,3,4,5], high:[6,7,8,9,10,11] };
let myName = '', myId = '', roomCode = '', myTeam = '';
let gameState = null, roomRef = null;
let claimSelection = {}, claimTeammates = [];

function randId() { return Math.random().toString(36).slice(2,9); }
function randCode() { return Math.random().toString(36).slice(2,8).toUpperCase(); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function setErr(msg) { document.getElementById('loginErr').textContent = msg; }

// 🔊 Loop Playback Initializer Tracking Background Music 
function startInfiniteBGM() {
  const bgm = document.getElementById('sndBackground');
  if (bgm && bgm.paused) {
    bgm.play().catch(e => console.log("Awaiting user click interaction."));
  }
}
window.addEventListener('click', startInfiniteBGM);
window.addEventListener('touchstart', startInfiniteBGM);

function setupPresence() {
  if (!myId || !roomCode) return;
  presenceRef = db.ref(`rooms/${roomCode}/presence/${myId}`);
  db.ref('.info/connected').on('value', snap => {
    if (!snap.val()) return;
    presenceRef.onDisconnect().set({ online: false, name: myName, ts: Date.now() });
    presenceRef.set({ online: true, name: myName, ts: Date.now() });
  });
}

function shuffleDeck() {
  let deck = [];
  COLORS.forEach(c => { for(let n=0;n<=11;n++) deck.push({color:c,num:n}); });
  for(let i=deck.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }
  return deck;
}

function dealCards(playerIds) {
  const deck = shuffleDeck();
  const hands = {};
  playerIds.forEach(id => hands[id] = []);
  deck.forEach((card, i) => hands[playerIds[i % playerIds.length]].push(card));
  return hands;
}

async function createRoom() {
  myName = document.getElementById('nameInput').value.trim();
  if(!myName) return setErr('Enter your name first');
  myId = randId(); roomCode = randCode(); roomRef = db.ref('rooms/' + roomCode);
  await roomRef.set({
    host: myId, status: 'lobby',
    players: { [myId]: { name: myName, team: '', ready: false } },
    teamA: [], teamB: []
  });
  setupPresence(); enterLobby();
}

async function joinRoom() {
  myName = document.getElementById('nameInput').value.trim();
  const code = document.getElementById('roomInput').value.trim().toUpperCase();
  if(!myName || !code) return setErr('Fill all fields');
  myId = randId(); roomCode = code; roomRef = db.ref('rooms/' + roomCode);
  const snap = await roomRef.once('value');
  if(!snap.exists()) return setErr('Room not found');
  const room = snap.val();
  if(room.status !== 'lobby') return setErr('Game started');
  await roomRef.update({ [`players/${myId}`]: { name: myName, team: '', ready: false } });
  setupPresence(); enterLobby();
}

function enterLobby() {
  showScreen('lobbyScreen');
  document.getElementById('lobbyCode').textContent = roomCode;
  roomRef.on('value', snap => {
    if(!snap.exists()) return;
    const room = snap.val();
    renderLobby(room);
    if(room.status === 'playing') { roomRef.off('value'); startGame(room); }
  });
}

function renderLobby(room) {
  const players = room.players || {};
  const teamA = (room.teamA || []).map(id => players[id]).filter(Boolean);
  const teamB = (room.teamB || []).map(id => players[id]).filter(Boolean);
  const renderSlots = (arr, c) => arr.map(p => `<div class="player-slot"><span class="dot ${c}"></span>${p.name}</div>`).join('') + Array.from({length: 2-arr.length}).map(()=>`<div class="player-slot empty">waiting...</div>`).join('');
  
  document.getElementById('teamASlots').innerHTML = renderSlots(teamA,'dot-a');
  document.getElementById('teamBSlots').innerHTML = renderSlots(teamB,'dot-b');
  if(room.host === myId && teamA.length === 2 && teamB.length === 2) {
    document.getElementById('lobbyActions').innerHTML = `<button class="btn btn-success" onclick="startGameHost()">Start Game</button>`;
  }
}

async function switchTeam(newTeam) {
  const snap = await roomRef.once('value');
  const room = snap.val();
  const target = newTeam === 'A' ? (room.teamA||[]) : (room.teamB||[]);
  if(target.length >= 2) return alert('Team full!');
  const newA = (room.teamA||[]).filter(id => id !== myId);
  const newB = (room.teamB||[]).filter(id => id !== myId);
  if(newTeam === 'A') newA.push(myId); else newB.push(myId);
  myTeam = newTeam;
  await roomRef.update({ [`players/${myId}/team`]: newTeam, teamA: newA, teamB: newB });
}

async function startGameHost() {
  const snap = await roomRef.once('value');
  const room = snap.val();
  const playerIds = [...(room.teamA || []), ...(room.teamB || [])];
  await roomRef.update({ status: 'playing', hands: dealCards(playerIds), currentTurn: room.host, scoreA: 0, scoreB: 0 });
}

function startGame(room) {
  showScreen('gameScreen');
  document.getElementById('myNameBadge').textContent = myName + ' · Team ' + myTeam;
  roomRef.on('value', snap => {
    if(!snap.exists()) return;
    gameState = snap.val(); renderGame(gameState);
    if(gameState.status === 'gameover') { roomRef.off('value'); showGameOver(gameState); }
  });
  roomRef.child('chat').on('child_added', snap => {
    const msg = snap.val();
    const el = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'chat-msg ' + (msg.type || 'system');
    div.innerHTML = msg.type !== 'system' ? `<span class="sender">${msg.sender}:</span>${msg.text}` : msg.text;
    el.appendChild(div); el.scrollTop = el.scrollHeight;
  });
}

function renderGame(room) {
  document.getElementById('scoreA').textContent = room.scoreA || 0;
  document.getElementById('scoreB').textContent = room.scoreB || 0;
  const pl = document.getElementById('playersList'); pl.innerHTML = '';
  const presence = room.presence || {};

  Object.entries(room.players).forEach(([id, p]) => {
    const count = (room.hands && room.hands[id]) ? room.hands[id].length : 0;
    const isActive = room.currentTurn === id;
    const isOnline = presence[id] ? presence[id].online !== false : true;
    const div = document.createElement('div');
    div.className = `player-card team-${p.team.toLowerCase()}${isActive ? ' active-turn' : ''}`;
    div.innerHTML = `<div class="pname"><span class="presence-dot ${isOnline?'dot-online':'dot-offline'}"></span>${p.name}</div><div class="pcards">${count} cards · Team ${p.team}</div>`;
    if(room.currentTurn === myId && id !== myId) {
      div.style.cursor = 'pointer'; div.onclick = () => roomRef.update({ currentTurn: id });
    }
    pl.appendChild(div);
  });

  const bundlesEl = document.getElementById('bundlesStatus'); bundlesEl.innerHTML = '';
  COLORS.forEach(color => {
    ['low','high'].forEach(b => {
      const won = room.bundles && room.bundles[`${color}_${b}`];
      if(won) bundlesEl.innerHTML += `<div class="bundle-item"><span class="bundle-label">${color.toUpperCase()} ${b}</span><span>Team ${won}</span></div>`;
    });
  });

  const myHand = (room.hands && room.hands[myId]) || [];
  const handEl = document.getElementById('myHand'); handEl.innerHTML = '';
  document.getElementById('handCount').textContent = myHand.length;
  myHand.forEach(card => {
    const cardEl = document.createElement('div'); cardEl.className = `card ${card.color} selectable`;
    cardEl.innerHTML = `<div class="cnum">${card.num}</div><div class="ccolor">${card.color.toUpperCase()}</div>`;
    cardEl.onclick = () => openGivePicker(card.color, card.num);
    handEl.appendChild(cardEl);
  });
}

function openGivePicker(color, num) {
  givePickerCard = { color, num };
  document.getElementById('givePickerPill').className = `preview-pill ${color}`;
  document.getElementById('givePickerPill').textContent = `${color.toUpperCase()} ${num}`;
  const listEl = document.getElementById('givePlayerList'); listEl.innerHTML = '';
  Object.entries(gameState.players).forEach(([id, p]) => {
    if (id === myId) return;
    const btn = document.createElement('button'); btn.className = 'ask-opponent-btn';
    btn.textContent = `${p.name} (Team ${p.team})`;
    btn.onclick = () => giveCardTo(id);
    listEl.appendChild(btn);
  });
  document.getElementById('givePickerOverlay').classList.add('open');
}

function closeGivePicker() { document.getElementById('givePickerOverlay').classList.remove('open'); }

async function giveCardTo(targetId) {
  closeGivePicker();
  const myHand = [...(gameState.hands[myId] || [])];
  const targetHand = [...(gameState.hands[targetId] || [])];
  const idx = myHand.findIndex(c => c.color === givePickerCard.color && c.num === givePickerCard.num);
  if (idx === -1) return;
  const [card] = myHand.splice(idx, 1); targetHand.push(card);
  
  // 🔊 Play Deal Audio SFX Local
  document.getElementById('sndDeal').play().catch(() => {});
  
  await roomRef.update({ [`hands/${myId}`]: myHand, [`hands/${targetId}`]: targetHand });
}

function openClaimBoard() {
  document.getElementById('claimSetup').style.display = 'block';
  document.getElementById('claimInteractive').style.display = 'none';
  document.getElementById('claimBoardModal').classList.add('open');
}
function closeClaimBoard() { document.getElementById('claimBoardModal').classList.remove('open'); }

function generateClaimCards() {
  const color = document.getElementById('cbColor').value;
  const bundle = document.getElementById('cbBundle').value;
  if(!color || !bundle) return alert('Select items!');
  claimTeammates = Object.entries(gameState.players).filter(([id, p]) => p.team === myTeam).map(([id, p]) => ({ id, name: p.name }));
  const range = bundle === 'low' ? BUNDLES.low : BUNDLES.high;
  const container = document.getElementById('claimCardsRow'); container.innerHTML = '';
  claimSelection = {};
  
  range.forEach(n => {
    const div = document.createElement('div'); div.className = `card ${color} selectable`;
    div.innerHTML = `<div class="cnum">${n}</div><div class="ccolor" id="cl_${n}">Unassigned</div>`;
    div.onclick = () => {
      let curr = claimSelection[n];
      let idx = curr ? (claimTeammates.findIndex(t => t.id === curr) + 1) % claimTeammates.length : 0;
      claimSelection[n] = claimTeammates[idx].id;
      div.classList.add('selected'); document.getElementById(`cl_${n}`).textContent = claimTeammates[idx].name;
    };
    container.appendChild(div);
  });
  document.getElementById('claimSetup').style.display = 'none';
  document.getElementById('claimInteractive').style.display = 'block';
}

async function submitInteractiveClaim() {
  const color = document.getElementById('cbColor').value;
  const bundle = document.getElementById('cbBundle').value;
  const range = bundle === 'low' ? BUNDLES.low : BUNDLES.high;
  if(Object.keys(claimSelection).length < 6) return alert('Assign all!');
  
  let isCorrect = true;
  range.forEach(n => {
    if(!(gameState.hands[claimSelection[n]] || []).some(c => c.color === color && c.num === n)) isCorrect = false;
  });

  if (isCorrect) {
    // 🔊 Audio & Flash Local triggers
    document.getElementById('sndSuccess').play().catch(() => {});
    document.getElementById('gameScreen').classList.add('flash-success');
    setTimeout(() => document.getElementById('gameScreen').classList.remove('flash-success'), 800);
    
    const updates = { [`bundles/${color}_${bundle}`]: myTeam, scoreA: gameState.scoreA + (myTeam==='A'?1:0), scoreB: gameState.scoreB + (myTeam==='B'?1:0) };
    range.forEach(n => {
      updates[`hands/${claimSelection[n]}`] = gameState.hands[claimSelection[n]].filter(c => !(c.color === color && c.num === n));
    });
    await roomRef.update(updates);
  } else {
    // 🔊 Audio & Shake local triggers
    document.getElementById('sndFail').play().catch(() => {});
    document.querySelector('.modal').classList.add('shake-animation');
    setTimeout(() => document.querySelector('.modal').classList.remove('shake-animation'), 400);
    alert('Claim failed!');
  }
  closeClaimBoard();
}

async function sendChat() {
  const inp = document.getElementById('chatInput'); if(!inp.value.trim()) return;
  await roomRef.child('chat').push({ text: inp.value.trim(), sender: myName, type: 'player' });
  inp.value = '';
}
function showGameOver(room) {
  showScreen('gameOverScreen');
  document.getElementById('winnerText').textContent = room.scoreA > room.scoreB ? 'Team A Wins!' : 'Team B Wins!';
}
</script>
</body>
</html>
