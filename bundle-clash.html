<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bundle Clash - Mobile</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff4d6d; --blue: #4cc9f0; --green: #06d6a0; --yellow: #ffd166;
    --bg: #0d0d1a; --panel: #13132b; --card-bg: #1a1a3e;
    --text: #f0f0ff; --muted: #7788aa; --accent: #f72585;
    --team-a: #4cc9f0; --team-b: #f72585;
    --success: #06d6a0; --warning: #ffd166;
    --purple: #7209b7; --violet: #560bad;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  h1, h2, h3 { font-family: 'Rajdhani', sans-serif; }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; }

  /* Login Responsive */
  .login-box { width: 92vw; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; background: var(--panel); border: 1px solid #2a3a5c; border-radius: 16px; }
  .login-box input { background: var(--bg); border: 1px solid #2a3a5c; border-radius: 8px; color: var(--text); padding: 0.75rem 1rem; width: 100%; outline: none; }
  .logo h1 { font-size: 2.4rem; text-align: center; background: linear-gradient(135deg, #f72585, #4cc9f0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #loginScreen { flex-direction: column; align-items: center; justify-content: center; gap: 2rem; }

  .btn { border: none; border-radius: 8px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; padding: 0.75rem; width: 100%; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: #2a3a5c; color: var(--text); }
  .btn-success { background: var(--success); color: #fff; }
  .divider { color: var(--muted); text-align: center; font-size: 0.85rem; }

  /* Lobby Responsive */
  #lobbyScreen { flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; padding: 1rem; }
  .lobby-box { background: var(--panel); border: 1px solid #2a3a5c; border-radius: 16px; padding: 1.25rem; width: 100%; max-width: 500px; }
  .room-code { font-size: 2rem; color: var(--warning); letter-spacing: 4px; text-align: center; margin: 0.5rem 0; }
  .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .team-col { background: var(--bg); border-radius: 10px; padding: 0.75rem; }
  .player-slot { background: #1a2a4a; border-radius: 6px; padding: 0.5rem; margin-bottom: 0.4rem; font-size: 0.85rem; }
  .player-slot.empty { color: var(--muted); font-style: italic; }

  /* Game Core Dynamic Column Setup */
  #gameScreen { flex-direction: column; height: 100dvh; overflow: hidden; }
  .game-header { padding: 0.5rem 0.75rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3a2a5c; background: #13132b; }
  .score-board { display: flex; gap: 0.75rem; }
  .score-item .val { font-size: 1.2rem; font-weight: 700; font-family: 'Rajdhani', sans-serif; }
  .val-a { color: var(--team-a); } .val-b { color: var(--team-b); }
  .game-body { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

  /* Players top row strip scroll */
  .players-panel { width: 100%; flex-direction: row; overflow-x: auto; overflow-y: hidden; padding: 0.5rem 0.75rem; display: flex; gap: 0.5rem; border-bottom: 1px solid #2a3a5c; background: var(--panel); }
  .players-panel h3 { display: none; }
  .player-card { min-width: 110px; flex-shrink: 0; font-size: 0.75rem; padding: 0.4rem 0.6rem; border: 1px solid #2a3a5c; border-radius: 8px; }
  .player-card.active-turn { border-color: var(--warning); background: #1a2a4a; }
  .presence-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .dot-online { background: var(--success); } .dot-offline { background: var(--accent); }

  .main-area { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .chat-action-area { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
  .chat-panel { display: flex; flex: 1; flex-direction: column; width: 100%; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 0.5rem 0.75rem; display: flex; flex-direction: column; gap: 0.4rem; }
  .chat-msg { border-radius: 6px; font-size: 0.82rem; padding: 0.35rem 0.6rem; }
  .chat-msg.system { background: #1a2a3a; color: var(--muted); }
  .chat-msg.player { background: #2a3a5c; }
  .chat-input-row { border-top: 1px solid #2a3a5c; display: flex; gap: 0.4rem; padding: 0.5rem 0.6rem; align-items: center; }
  .chat-input-row input { background: var(--bg); border: 1px solid #2a3a5c; border-radius: 6px; color: var(--text); flex: 1; padding: 0.4rem 0.6rem; font-size: 0.85rem; outline: none; }

  /* Hand Setup Mobile */
  .hand-area { padding: 0.5rem 0.75rem; border-top: 1px solid #2a3a5c; background: var(--panel); }
  .hand-area h3 { font-size: 0.65rem; color: var(--muted); margin-bottom: 0.3rem; text-transform: uppercase; }
  .cards-row { display: flex; flex-wrap: wrap; gap: 4px; }

  /* ✨ Visual Polish Animations Mobile Assets */
  @keyframes cardPop {
    0% { transform: scale(0.8) translateY(10px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  .card {
    align-items: center; border-radius: 6px; border: 2px solid transparent;
    display: flex; flex-direction: column; font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem; font-weight: 700; height: 58px; justify-content: center; width: 40px;
    animation: cardPop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  .card.selectable { cursor: pointer; border-color: #fff5; }
  .card.selected { border-color: var(--warning); transform: scale(1.05); }

  @keyframes claimShake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }
  .shake-animation { animation: claimShake 0.4s ease-in-out !important; border-color: var(--accent) !important; }

  @keyframes flashGreen {
    0%, 100% { background: var(--panel); }
    50% { background: rgba(6, 214, 160, 0.2); border-color: var(--success); }
  }
  .flash-success { animation: flashGreen 0.8s ease-in-out; }

  .card.red    { background: linear-gradient(135deg, #4a0820, #7a1030); color: #ff4d6d; }
  .card.blue   { background: linear-gradient(135deg, #052a4a, #0a3a6a); color: #4cc9f0; }
  .card.green  { background: linear-gradient(135deg, #023a25, #045535); color: #06d6a0; }
  .card.yellow { background: linear-gradient(135deg, #3a2800, #5a3c00); color: #ffd166; }
  .card .cnum { font-size: 1.05rem; }
  .card .ccolor { font-size: 0.5rem; opacity: 0.8; }

  /* Modals overrides */
  .ask-picker-overlay, .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 200; }
  .ask-picker-overlay.open, .modal-overlay.open { display: flex; }
  .ask-picker-box, .modal { background: #13132b; border: 1px solid #2a3a5c; border-radius: 16px; padding: 1.25rem; width: 94vw; max-width: 400px; }
  .ask-picker-card-preview .preview-pill { display: inline-block; padding: 0.3rem 1rem; border-radius: 20px; font-weight: 700; }
  .ask-opponent-btn { width: 100%; padding: 0.6rem; margin-bottom: 0.4rem; border-radius: 8px; background: #200a35; color: #fff; border: 1px solid #444; }
  .ask-picker-cancel { width: 100%; padding: 0.5rem; background: transparent; border: 1px solid #444; color: #aaa; border-radius: 8px; }
  select { background: var(--bg); border: 1px solid #2a3a5c; color: var(--text); padding: 0.4rem; width: 100%; margin-bottom: 0.4rem; }
  .modal-btns { display: flex; gap: 0.5rem; }

  /* Bundles bottom status line for mobile views */
  .sidebar-bundles-mobile { display: flex; flex-wrap: wrap; gap: 6px; padding: 0.4rem 0.75rem; border-top: 1px solid #2a3a5c; background: var(--panel); font-size: 0.65rem; }
  #gameOverScreen { flex-direction: column; align-items: center; justify-content: center; gap: 2rem; }
</style>
</head>
<body>

<audio id="sndBackground" src="song.mp3" preload="auto" loop></audio>
<audio id="sndDeal" src="deal.mp3" preload="auto"></audio>
<audio id="sndSuccess" src="success.mp3" preload="auto"></audio>
<audio id="sndFail" src="fail.mp3" preload="auto"></audio>

<div id="loginScreen" class="screen active">
  <div class="logo"><h1>Bundle Clash</h1></div>
  <div class="login-box">
    <input id="nameInput" type="text" placeholder="Your name" maxlength="16" />
    <button class="btn btn-primary" onclick="createRoom()">Create Room</button>
    <div class="divider">— or join existing —</div>
    <input id="roomInput" type="text" placeholder="Room code" maxlength="6" style="text-transform:uppercase;" />
    <button class="btn btn-secondary" onclick="joinRoom()">Join Room</button>
    <div id="loginErr" style="color:var(--accent); font-size:0.8rem; text-align:center;"></div>
  </div>
</div>

<div id="lobbyScreen" class="screen">
  <div class="lobby-box">
    <h2>Lobby</h2>
    <div class="room-code" id="lobbyCode"></div>
    <div class="teams-grid">
      <div class="team-col">
        <h3>Team A</h3><div id="teamASlots"></div>
        <button class="btn btn-secondary" style="font-size:0.8rem; padding:0.4rem;" onclick="switchTeam('A')">Join A</button>
      </div>
      <div class="team-col">
        <h3>Team B</h3><div id="teamBSlots"></div>
        <button class="btn btn-secondary" style="font-size:0.8rem; padding:0.4rem;" onclick="switchTeam('B')">Join B</button>
      </div>
    </div>
    <div style="margin-top:1rem;" id="lobbyActions"></div>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="game-header">
    <h2>Bundle Clash</h2>
    <div class="score-board">
      <div class="score-item"><span class="val val-a" id="scoreA">0</span></div>
      <div style="color:var(--muted)">-</div>
      <div class="score-item"><span class="val val-b" id="scoreB">0</span></div>
    </div>
    <div id="myNameBadge" style="font-size:0.75rem;"></div>
  </div>

  <div class="game-body">
    <div class="players-panel" id="playersList"></div>

    <div class="main-area">
      <div class="chat-action-area">
        <div class="chat-panel">
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-row">
            <button class="btn btn-primary" style="width:auto; padding:0.4rem 0.6rem; font-size:0.8rem; background:var(--warning);" onclick="openClaimBoard()">Claim</button>
            <input id="chatInput" type="text" placeholder="Message..." onkeydown="if(event.key==='Enter')sendChat()" />
            <button class="btn btn-primary" style="width:auto; padding:0.4rem 0.6rem; font-size:0.8rem;" onclick="sendChat()">➤</button>
          </div>
        </div>
      </div>

      <div class="sidebar-bundles-mobile" id="bundlesStatusMobile"></div>

      <div class="hand-area">
        <h3>My Hand (<span id="handCount">0</span>)</h3>
        <div class="cards-row" id="myHand"></div>
      </div>
    </div>
  </div>
</div>

<div class="ask-picker-overlay" id="givePickerOverlay">
  <div class="ask-picker-box">
    <h3>Give Card</h3>
    <div class="ask-picker-card-preview" style="margin:0.5rem 0;"><span class="preview-pill" id="givePickerPill">—</span></div>
    <div id="givePlayerList"></div>
    <button class="ask-picker-cancel" onclick="closeGivePicker()">Cancel</button>
  </div>
</div>

<div class="modal-overlay" id="claimBoardModal">
  <div class="modal">
    <h2>Claim Board</h2>
    <div id="claimSetup">
      <select id="cbColor">
        <option value="">— Color —</option><option value="red">Red</option><option value="blue">Blue</option><option value="green">Green</option><option value="yellow">Yellow</option>
      </select>
      <select id="cbBundle">
        <option value="">— Bundle —</option><option value="low">Low (0–5)</option><option value="high">High (6–11)</option>
      </select>
      <button class="btn btn-success" onclick="generateClaimCards()">Assign Cards</button>
      <button class="btn btn-secondary" style="margin-top:0.4rem;" onclick="closeClaimBoard()">Cancel</button>
    </div>
    <div id="claimInteractive" style="display:none;">
      <div id="claimCardsRow" class="cards-row" style="justify-content:center; margin:1rem 0;"></div>
      <div class="modal-btns">
        <button class="btn btn-secondary" onclick="closeClaimBoard()">Cancel</button>
        <button class="btn btn-success" onclick="submitInteractiveClaim()">Submit</button>
      </div>
    </div>
  </div>
</div>

<div id="gameOverScreen" class="screen">
  <div class="winner-box">
    <h1 id="winnerText">🏆</h1>
    <button class="btn btn-primary" style="margin-top:1.5rem;" onclick="location.reload()">Play Again</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  FIREBASE GAME LOGIC & STATE HANDLING
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyBMMo7hjXRwFGhdDH2Jl3loZI2rQtK4jwQ",
  authDomain: "card-1e6c9.firebaseapp.com",
  databaseURL: "https://card-1e6c9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "card-1e6c9",
  storageBucket: "card-1e6c9.firebasestorage.app",
  messagingSenderId: "679678925926",
  appId: "1:679678925926:web:6d448f896170179f22a1a7",
  measurementId: "G-3951QWXT65"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let presenceRef = null;
const COLORS = ['red','blue','green','yellow'];
const BUNDLES = { low:[0,1,2,3,4,5], high:[6,7,8,9,10,11] };
let myName = '', myId = '', roomCode = '', myTeam = '';
let gameState = null, roomRef = null;
let claimSelection = {}, claimTeammates = [];

function randId() { return Math.random().toString(36).slice(2,9); }
function randCode() { return Math.random().toString(36).slice(2,8).toUpperCase(); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// 🔊 Loop Playback Initializer Tracking Background Music Mobile
function startInfiniteBGM() {
  const bgm = document.getElementById('sndBackground');
  if (bgm && bgm.paused) {
    bgm.play().catch(() => {});
  }
}
window.addEventListener('click', startInfiniteBGM);
window.addEventListener('touchstart', startInfiniteBGM);

function setupPresence() {
  if (!myId || !roomCode) return;
  presenceRef = db.ref(`rooms/${roomCode}/presence/${myId}`);
  db.ref('.info/connected').on('value', snap => {
    if (!snap.val()) return;
    presenceRef.onDisconnect().set({ online: false, name: myName, ts: Date.now() });
    presenceRef.set({ online: true, name: myName, ts: Date.now() });
  });
}

function shuffleDeck() {
  let deck = [];
  COLORS.forEach(c => { for(let n=0;n<=11;n++) deck.push({color:c,num:n}); });
  for(let i=deck.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }
  return deck;
}

function dealCards(playerIds) {
  const deck = shuffleDeck(); const hands = {};
  playerIds.forEach(id => hands[id] = []);
  deck.forEach((card, i) => hands[playerIds[i % playerIds.length]].push(card));
  return hands;
}

async function createRoom() {
  myName = document.getElementById('nameInput').value.trim(); if(!myName) return;
  myId = randId(); roomCode = randCode(); roomRef = db.ref('rooms/' + roomCode);
  await roomRef.set({ host: myId, status: 'lobby', players: { [myId]: { name: myName, team: '', ready: false } }, teamA: [], teamB: [] });
  setupPresence(); enterLobby();
}

async function joinRoom() {
  myName = document.getElementById('nameInput').value.trim(); const code = document.getElementById('roomInput').value.trim().toUpperCase();
  if(!myName || !code) return;
  myId = randId(); roomCode = code; roomRef = db.ref('rooms/' + roomCode);
  const snap = await roomRef.once('value'); if(!snap.exists()) return;
  await roomRef.update({ [`players/${myId}`]: { name: myName, team: '', ready: false } });
  setupPresence(); enterLobby();
}

function enterLobby() {
  showScreen('lobbyScreen'); document.getElementById('lobbyCode').textContent = roomCode;
  roomRef.on('value', snap => {
    if(!snap.exists()) return;
    const room = snap.val(); renderLobby(room);
    if(room.status === 'playing') { roomRef.off('value'); startGame(room); }
  });
}

function renderLobby(room) {
  const players = room.players || {};
  const teamA = (room.teamA || []).map(id => players[id]).filter(Boolean);
  const teamB = (room.teamB || []).map(id => players[id]).filter(Boolean);
  const renderSlots = (arr, c) => arr.map(p => `<div class="player-slot"><span class="presence-dot ${c}"></span>${p.name}</div>`).join('') + Array.from({length: 2-arr.length}).map(()=>`<div class="player-slot empty">waiting...</div>`).join('');
  
  document.getElementById('teamASlots').innerHTML = renderSlots(teamA,'dot-online');
  document.getElementById('teamBSlots').innerHTML = renderSlots(teamB,'dot-offline');
  if(room.host === myId && teamA.length === 2 && teamB.length === 2) {
    document.getElementById('lobbyActions').innerHTML = `<button class="btn btn-success" onclick="startGameHost()">Start Game</button>`;
  }
}

async function switchTeam(newTeam) {
  const snap = await roomRef.once('value'); const room = snap.val();
  const target = newTeam === 'A' ? (room.teamA||[]) : (room.teamB||[]); if(target.length >= 2) return alert('Full!');
  const newA = (room.teamA||[]).filter(id => id !== myId); const newB = (room.teamB||[]).filter(id => id !== myId);
  if(newTeam === 'A') newA.push(myId); else newB.push(myId);
  myTeam = newTeam; await roomRef.update({ [`players/${myId}/team`]: newTeam, teamA: newA, teamB: newB });
}

async function startGameHost() {
  const snap = await roomRef.once('value'); const room = snap.val();
  const playerIds = [...(room.teamA || []), ...(room.teamB || [])];
  await roomRef.update({ status: 'playing', hands: dealCards(playerIds), currentTurn: room.host, scoreA: 0, scoreB: 0 });
}

function startGame(room) {
  showScreen('gameScreen'); document.getElementById('myNameBadge').textContent = myName + ' (Team ' + myTeam + ')';
  roomRef.on('value', snap => {
    if(!snap.exists()) return;
    gameState = snap.val(); renderGame(gameState);
    if(gameState.status === 'gameover') { roomRef.off('value'); showGameOver(gameState); }
  });
  roomRef.child('chat').on('child_added', snap => {
    const msg = snap.val(); const el = document.getElementById('chatMessages');
    const div = document.createElement('div'); div.className = 'chat-msg ' + (msg.type || 'system');
    div.innerHTML = msg.type !== 'system' ? `<span class="sender">${msg.sender}:</span>${msg.text}` : msg.text;
    el.appendChild(div); el.scrollTop = el.scrollHeight;
  });
}

function renderGame(room) {
  document.getElementById('scoreA').textContent = room.scoreA || 0;
  document.getElementById('scoreB').textContent = room.scoreB || 0;
  const pl = document.getElementById('playersList'); pl.innerHTML = '';
  const presence = room.presence || {};

  Object.entries(room.players).forEach(([id, p]) => {
    const count = (room.hands && room.hands[id]) ? room.hands[id].length : 0;
    const isActive = room.currentTurn === id;
    const isOnline = presence[id] ? presence[id].online !== false : true;
    const div = document.createElement('div'); div.className = `player-card${isActive ? ' active-turn' : ''}`;
    div.innerHTML = `<span class="presence-dot ${isOnline?'dot-online':'dot-offline'}"></span>${p.name} (${count})`;
    if(room.currentTurn === myId && id !== myId) {
      div.onclick = () => roomRef.update({ currentTurn: id });
    }
    pl.appendChild(div);
  });

  const bundlesMobileEl = document.getElementById('bundlesStatusMobile'); bundlesMobileEl.innerHTML = '';
  COLORS.forEach(color => {
    ['low','high'].forEach(b => {
      const won = room.bundles && room.bundles[`${color}_${b}`];
      if(won) bundlesMobileEl.innerHTML += `<span style="padding:2px 6px; background:#2a3a5c; border-radius:4px;">${color[0].toUpperCase()}-${b==='low'?'L':'H'} (T-${won})</span>`;
    });
  });

  const myHand = (room.hands && room.hands[myId]) || [];
  const handEl = document.getElementById('myHand'); handEl.innerHTML = '';
  document.getElementById('handCount').textContent = myHand.length;
  myHand.forEach(card => {
    const cardEl = document.createElement('div'); cardEl.className = `card ${card.color} selectable`;
    cardEl.innerHTML = `<div class="cnum">${card.num}</div><div class="ccolor">${card.color[0].toUpperCase()}</div>`;
    cardEl.onclick = () => openGivePicker(card.color, card.num);
    handEl.appendChild(cardEl);
  });
}

function openGivePicker(color, num) {
  givePickerCard = { color, num };
  document.getElementById('givePickerPill').className = `preview-pill ${color}`;
  document.getElementById('givePickerPill').textContent = `${color.toUpperCase()} ${num}`;
  const listEl = document.getElementById('givePlayerList'); listEl.innerHTML = '';
  Object.entries(gameState.players).forEach(([id, p]) => {
    if (id === myId) return;
    const btn = document.createElement('button'); btn.className = 'ask-opponent-btn';
    btn.textContent = p.name; btn.onclick = () => giveCardTo(id);
    listEl.appendChild(btn);
  });
  document.getElementById('givePickerOverlay').classList.add('open');
}

function closeGivePicker() { document.getElementById('givePickerOverlay').classList.remove('open'); }

async function giveCardTo(targetId) {
  closeGivePicker();
  const myHand = [...(gameState.hands[myId] || [])]; const targetHand = [...(gameState.hands[targetId] || [])];
  const idx = myHand.findIndex(c => c.color === givePickerCard.color && c.num === givePickerCard.num);
  if (idx === -1) return;
  const [card] = myHand.splice(idx, 1); targetHand.push(card);
  
  // 🔊 Play Local Deal SFX Mobile
  document.getElementById('sndDeal').play().catch(() => {});
  
  await roomRef.update({ [`hands/${myId}`]: myHand, [`hands/${targetId}`]: targetHand });
}

function openClaimBoard() {
  document.getElementById('claimSetup').style.display = 'block';
  document.getElementById('claimInteractive').style.display = 'none';
  document.getElementById('claimBoardModal').classList.add('open');
}
function closeClaimBoard() { document.getElementById('claimBoardModal').classList.remove('open'); }

function generateClaimCards() {
  const color = document.getElementById('cbColor').value; const bundle = document.getElementById('cbBundle').value;
  if(!color || !bundle) return alert('Select items!');
  claimTeammates = Object.entries(gameState.players).filter(([id, p]) => p.team === myTeam).map(([id, p]) => ({ id, name: p.name }));
  const range = bundle === 'low' ? BUNDLES.low : BUNDLES.high;
  const container = document.getElementById('claimCardsRow'); container.innerHTML = ''; claimSelection = {};
  
  range.forEach(n => {
    const div = document.createElement('div'); div.className = `card ${color} selectable`;
    div.innerHTML = `<div class="cnum">${n}</div><div class="ccolor" id="cl_${n}">?</div>`;
    div.onclick = () => {
      let curr = claimSelection[n];
      let idx = curr ? (claimTeammates.findIndex(t => t.id === curr) + 1) % claimTeammates.length : 0;
      claimSelection[n] = claimTeammates[idx].id;
      div.classList.add('selected'); document.getElementById(`cl_${n}`).textContent = claimTeammates[idx].name.slice(0,3);
    };
    container.appendChild(div);
  });
  document.getElementById('claimSetup').style.display = 'none';
  document.getElementById('claimInteractive').style.display = 'block';
}

async function submitInteractiveClaim() {
  const color = document.getElementById('cbColor').value; const bundle = document.getElementById('cbBundle').value;
  const range = bundle === 'low' ? BUNDLES.low : BUNDLES.high;
  if(Object.keys(claimSelection).length < 6) return alert('Assign all!');
  
  let isCorrect = true;
  range.forEach(n => {
    if(!(gameState.hands[claimSelection[n]] || []).some(c => c.color === color && c.num === n)) isCorrect = false;
  });

  if (isCorrect) {
    // 🔊 Audio & Flash triggers local
    document.getElementById('sndSuccess').play().catch(() => {});
    document.getElementById('gameScreen').classList.add('flash-success');
    setTimeout(() => document.getElementById('gameScreen').classList.remove('flash-success'), 800);
    
    const updates = { [`bundles/${color}_${bundle}`]: myTeam, scoreA: gameState.scoreA + (myTeam==='A'?1:0), scoreB: gameState.scoreB + (myTeam==='B'?1:0) };
    range.forEach(n => { updates[`hands/${claimSelection[n]}`] = gameState.hands[claimSelection[n]].filter(c => !(c.color === color && c.num === n)); });
    await roomRef.update(updates);
  } else {
    // 🔊 Audio & Shake triggers local
    document.getElementById('sndFail').play().catch(() => {});
    document.querySelector('.modal').classList.add('shake-animation');
    setTimeout(() => document.querySelector('.modal').classList.remove('shake-animation'), 400);
    alert('Failed!');
  }
  closeClaimBoard();
}

async function sendChat() {
  const inp = document.getElementById('chatInput'); if(!inp.value.trim()) return;
  await roomRef.child('chat').push({ text: inp.value.trim(), sender: myName, type: 'player' }); inp.value = '';
}
function showGameOver(room) { showScreen('gameOverScreen'); document.getElementById('winnerText').textContent = room.scoreA > room.scoreB ? 'A Wins!' : 'B Wins!'; }
</script>
